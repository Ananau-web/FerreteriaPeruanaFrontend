<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" [class.collapsed]="sidebarColapsado">

  <!-- Logo -->
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <i class="bi bi-tools"></i>
    </div>
    <div class="sidebar-brand" *ngIf="!sidebarColapsado">
      <span class="sidebar-brand-name">Ferretería Peruana</span>
      <span class="sidebar-brand-sub">Gestión Logística</span>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="sidebar-nav">
    <a *ngFor="let item of navItems"
       class="sidebar-link"
       [routerLink]="item.route"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
       [title]="item.label">
      <i class="bi" [ngClass]="item.icon"></i>
      <span class="sidebar-link-text" *ngIf="!sidebarColapsado">
        {{ item.label }}
      </span>
      <span class="badge-proximamente" *ngIf="!item.activo && !sidebarColapsado">
        Pronto
      </span>
    </a>
  </nav>

  <!-- Botón Colapsar -->
  <div class="sidebar-footer">
    <button class="sidebar-toggle" (click)="toggleSidebar()" title="Colapsar menú">
      <i class="bi" [ngClass]="sidebarColapsado ? 'bi-chevron-right' : 'bi-chevron-left'"></i>
    </button>
  </div>
</aside>

<!-- ===== CONTENIDO PRINCIPAL ===== -->
<div class="main-wrapper" [class.sidebar-collapsed]="sidebarColapsado">

  <!-- Top Navbar -->
  <header class="top-navbar">
    <div class="navbar-left">
      <button class="btn-hamburger d-md-none" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
    </div>

    <div class="navbar-right">
      <!-- Dropdown Usuario -->
      <div class="user-menu" (click)="toggleDropdown()">
        <div class="user-avatar">
          {{ inicialesUsuario }}
        </div>
        <div class="user-info d-none d-md-block">
          <span class="user-name">{{ nombreUsuario }}</span>
          <span class="user-role">{{ rolUsuario }}</span>
        </div>
        <i class="bi bi-chevron-down user-chevron d-none d-md-block"></i>
      </div>

      <!-- Dropdown menu -->
      <div class="user-dropdown" [class.show]="dropdownAbierto">
        <div class="dropdown-header">
          <strong>{{ nombreUsuario }}</strong>
          <span>{{ rolUsuario }}</span>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" (click)="cerrarSesion()">
          <i class="bi bi-box-arrow-left me-2"></i>
          Cerrar Sesión
        </button>
      </div>

      <!-- Backdrop para cerrar dropdown -->
      <div *ngIf="dropdownAbierto" class="dropdown-backdrop" (click)="cerrarDropdown()"></div>
    </div>
  </header>

  <!-- Contenido de la página -->
  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
